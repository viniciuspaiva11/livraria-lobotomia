<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Livraria Lobotomia</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Serif+Display:ital@1&family=DM+Sans:wght@300;400&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#f5f5f0;color:#1a1a18;font-family:'DM Sans',sans-serif;font-weight:300;min-height:100vh;display:flex;align-items:center;justify-content:center;text-align:center;padding:2rem;}
.wrap{max-width:560px;}
img.logo{width:100px;margin-bottom:2rem;opacity:.85;}
h1{font-family:'Bebas Neue',sans-serif;font-size:clamp(2.5rem,8vw,5rem);letter-spacing:.05em;color:#1a1a18;line-height:1;margin-bottom:.5rem;}
h1 span{color:#8a8a8a;}
p.sub{font-family:'DM Serif Display',serif;font-style:italic;font-size:1.15rem;color:#555;margin-bottom:2.5rem;line-height:1.55;}
a.cta{display:inline-block;font-size:.78rem;font-weight:400;letter-spacing:.15em;text-transform:uppercase;color:#f5f5f0;background:#1a1a18;padding:.85rem 2rem;text-decoration:none;}
.hint{margin-top:1.5rem;font-size:.75rem;color:#aaa;letter-spacing:.05em;}
</style>
</head>
<body>
<div class="wrap">
  <img class="logo" src="logo.png" alt="Livraria Lobotomia"/>
  <h1>Livraria <span>Lobotomia</span></h1>
  <p class="sub">Reflexão e desconforto.<br>Nossa marca registrada.</p>
  <a href="/xpassarinho" class="cta">Ver X-Passarinho &rarr;</a>
  <p class="hint">Página completa em breve.</p>
</div>
</body>
</html>
